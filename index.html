<!DOCTYPE html>
<html>
<head>
    <title>Львів: Мапа подій</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 100vh; width: 100%; }
        body { margin: 0; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Центр Львова
        var map = L.map('map').setView([49.8397, 24.0297], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Завантаження даних з сервера
        fetch('/data')
            .then(response => response.json())
            .then(data => {
                data.forEach(item => {
                    if (item.type === 'point') {
                        L.marker(item.coords).addTo(map)
                            .bindPopup(`<b>${item.time}</b><br>${item.description}`);
                    } else if (item.type === 'line') {
                        L.polyline(item.coords, {color: item.color, weight: 5}).addTo(map)
                            .bindPopup(`<b>${item.time}</b><br>${item.description}`);
                    }
                });
            });
    </script>
</body>
</html>
