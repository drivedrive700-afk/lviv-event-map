<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта подій Львова</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
        .popup-content {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.4;
        }
        .popup-title {
            font-size: 16px;
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }
        .popup-time {
            color: #666;
            font-size: 12px;
            display: flex;
            align-items: center;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Ініціалізація карти (центр - Львів)
    var map = L.map('map').setView([49.8397, 24.0297], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // Іконка маркера (використовуємо твій marker.png)
    var myIcon = L.icon({
        iconUrl: 'marker.png',
        iconSize: [32, 32],
        iconAnchor: [16, 32],
        popupAnchor: [0, -32]
    });

    // Функція для завантаження точок з бази
    async function loadPoints() {
        try {
            const response = await fetch('/data');
            const points = await response.json();

            points.forEach(point => {
                // ПРАВКА ТУТ: перевіряємо наявність заголовка
                const title = point.title || "Подія";
                
                L.marker(point.coords, {icon: myIcon})
                    .addTo(map)
                    .bindPopup(`
                        <div class="popup-content">
                            <span class="popup-title">${title}</span>
                            <div>${point.description}</div>
                            <div class="popup-time">🕒 ${point.time}</div>
                        </div>
                    `);
            });
        } catch (err) {
            console.error("Помилка завантаження даних:", err);
        }
    }

    loadPoints();
</script>

</body>
</html>
