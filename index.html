<!DOCTYPE html>
<html>
<head>
    <title>Карта подій Львова</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 100vh; width: 100%; }
        body { margin: 0; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        // Центруємо карту на Львові
        var map = L.map('map').setView([49.8397, 24.0297], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Налаштовуємо твою нову іконку
        var myIcon = L.icon({
            iconUrl: 'marker.png', // Назва твого файлу на GitHub
            iconSize: [32, 32],    // Розмір (можеш підправити під свою іконку)
            iconAnchor: [16, 32],  // Точка, якою шпилька "тикає" в карту (центр низу)
            popupAnchor: [0, -32]  // Звідки вилітає текст
        });

        async function loadPoints() {
            try {
                const response = await fetch('/data');
                const points = await response.json();
                
                points.forEach(p => {
                    if (p.geom_type === 'point') {
                        L.marker(p.coords, {icon: myIcon}).addTo(map)
                         .bindPopup(`<b>${p.type}</b><br>${p.description}<br>🕒 ${p.time}`);
                    } else if (p.geom_type === 'line') {
                        L.polyline(p.coords, {color: p.color, weight: 5}).addTo(map)
                         .bindPopup(`<b>${p.type}</b><br>${p.description}<br>🕒 ${p.time}`);
                    }
                });
            } catch (err) {
                console.error("Помилка:", err);
            }
        }

        loadPoints();
    </script>
</body>
</html>
