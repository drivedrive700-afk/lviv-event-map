<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дорожня Карта</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; }
        #map { height: 100vh; width: 100%; }
        .popup-time { color: gray; font-size: 0.8em; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Ініціалізація карти (центр на Україну)
        const map = L.map('map').setView([48.3794, 31.1656], 6);

        // Додаємо шар карти (OpenStreetMap)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        async function loadMarkers() {
            try {
                const response = await fetch('/data');
                const data = await response.json();

                data.forEach(item => {
                    let layer;
                    
                    // Перевіряємо, чи це точка, чи лінія (відповідно до нового коду бота)
                    if (item.geom_type === "point") {
                        // Малюємо кружечок (CircleMarker виглядає охайніше за стандартну іконку)
                        layer = L.circleMarker([item.coords[0], item.coords[1]], {
                            radius: 8,
                            fillColor: item.color,
                            color: "#fff",
                            weight: 2,
                            opacity: 1,
                            fillOpacity: 0.8
                        });
                    } else if (item.geom_type === "line") {
                        // Малюємо лінію
                        layer = L.polyline(item.coords, {
                            color: item.color,
                            weight: 5,
                            opacity: 0.7
                        });
                    }

                    if (layer) {
                        const content = `
                            <b>${item.type}</b><br>
                            ${item.description}<br>
                            <span class="popup-time">Час: ${item.time}</span>
                        `;
                        layer.addTo(map).bindPopup(content);
                    }
                });
            } catch (error) {
                console.error('Помилка завантаження даних:', error);
            }
        }

        // Завантажуємо дані при старті
        loadMarkers();

        // Оновлюємо дані кожні 30 секунд для "автоматичного" оновлення
        setInterval(loadMarkers, 30000);
    </script>
</body>
</html>
