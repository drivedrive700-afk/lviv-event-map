<!DOCTYPE html>
<html>
<head>
    <title>Карта подій Львова</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 100vh; width: 100%; }
        body { margin: 0; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        // Центруємо карту на Львові (координати 49.84, 24.03)
        var map = L.map('map').setView([49.8397, 24.0297], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        async function loadPoints() {
            try {
                // Запитуємо дані з нашого сервера
                const response = await fetch('/data');
                const points = await response.json();
                
                points.forEach(p => {
                    if (p.geom_type === 'point') {
                        L.marker(p.coords, {
                            icon: L.divIcon({
                                className: 'custom-div-icon',
                                html: `<div style="background-color:${p.color}; width:15px; height:15px; border-radius:50%; border:2px solid white;"></div>`,
                                iconSize: [15, 15]
                            })
                        }).addTo(map).bindPopup(`<b>${p.type}</b><br>${p.description}<br>🕒 ${p.time}`);
                    } else if (p.geom_type === 'line') {
                        L.polyline(p.coords, {color: p.color, weight: 5}).addTo(map)
                         .bindPopup(`<b>${p.type}</b><br>${p.description}<br>🕒 ${p.time}`);
                    }
                });
            } catch (err) {
                console.error("Помилка завантаження точок:", err);
            }
        }

        loadPoints();
    </script>
</body>
</html>
